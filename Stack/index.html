<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>

    <style>
        body {
            font-family: sans-serif;
            background-color: #f9f9f9;
        }

        .box {
            border: 1px solid black;
            padding: 20px;
            margin-bottom: 20px;
        }


        .item {
            border: 1px solid black;
            padding: 8px 16px;
        }

        .view {
            display: flex;
            gap: 10px;
        }
    </style>
</head>

<body>

    <div class="container">
        <h2>Stack | Queue</h2>

        <div class="box">
            <div class="controls">
                <select id="actionSelect" onchange="checkInputType()">
                    <option value="add">Add</option>
                    <option value="remove">Remove</option>
                    <option value="peek">Peek</option>
                    <option value="clear">Clear</option>
                </select>

                <input type="text" id="valueInput" placeholder="Enter value">

                <button onclick="runAction()">Run</button>

                <strong id="infoDisplay" style="color: red;"></strong>
            </div>
        </div>

        <div class="box">
            <h3>Stack (LIFO)</h3>
            <div class="view" id="stackDisplay"></div>
        </div>

        <div class="box">
            <h3>Queue (FIFO)</h3>
            <div class="view" id="queueDisplay"></div>
        </div>

    </div>

    <script>
        class Node {
            constructor(data) {
                this.data = data;
                this.next = null;
            }
        }

        class Stack {
            constructor() {
                this.top = null;
            }

            push(value) {
                let newNode = new Node(value);
                newNode.next = this.top;
                this.top = newNode;
            }

            pop() {
                if (this.top === null) {
                    return "Empty";
                }

                let valueToReturn = this.top.data;
                this.top = this.top.next;

                return valueToReturn;
            }

            peek() {
                if (this.top === null) {
                    return "Empty";
                }
                return this.top.data;
            }

            clear() {
                this.top = null;
            }
        }

        class Queue {
            constructor() {
                this.head = null;
                this.tail = null;
            }

            enqueue(value) {
                let newNode = new Node(value);

                if (this.head === null) {
                    this.head = newNode;
                    this.tail = newNode;
                } else {
                    this.tail.next = newNode;
                    this.tail = newNode;
                }
            }

            dequeue() {
                if (this.head === null) {
                    return "Empty";
                }

                let valueToReturn = this.head.data;
                this.head = this.head.next;

                if (this.head === null) {
                    this.tail = null;
                }

                return valueToReturn;
            }

            peek() {
                if (this.head === null) {
                    return "Empty";
                }
                return this.head.data;
            }

            clear() {
                this.head = null;
                this.tail = null;
            }
        }

        let myStack = new Stack();
        let myQueue = new Queue();

        function checkInputType() {
            let action = document.getElementById("actionSelect").value;
            let inputField = document.getElementById("valueInput");

            if (action === "add") {
                inputField.style.display = "inline-block";
            } else {
                inputField.style.display = "none";
                inputField.value = "";
            }
        }

        function runAction() {
            let action = document.getElementById("actionSelect").value;
            let inputValue = document.getElementById("valueInput").value;
            let infoDisplay = document.getElementById("infoDisplay");

            let stackResult = "";
            let queueResult = "";

            if (action === "add") {
                if (inputValue !== "") {
                    myStack.push(inputValue);
                    myQueue.enqueue(inputValue);
                    document.getElementById("valueInput").value = "";
                }
            }

            if (action === "remove") {
                stackResult = myStack.pop();
                queueResult = myQueue.dequeue();
            }

            if (action === "peek") {
                stackResult = myStack.peek();
                queueResult = myQueue.peek();
            }

            if (action === "clear") {
                myStack.clear();
                myQueue.clear();
            }

            if (stackResult !== "" || queueResult !== "") {
                infoDisplay.innerHTML = "Stack: " + stackResult + " | Queue: " + queueResult;
            } else {
                infoDisplay.innerHTML = "";
            }

            drawStack();
            drawQueue();
        }

        function drawStack() {
            let displayArea = document.getElementById("stackDisplay");
            displayArea.innerHTML = "";

            let currentNode = myStack.top;

            while (currentNode !== null) {
                let box = document.createElement("div");
                box.className = "item";
                box.innerHTML = currentNode.data;
                displayArea.appendChild(box);

                currentNode = currentNode.next;
            }
        }

        function drawQueue() {
            let displayArea = document.getElementById("queueDisplay");
            displayArea.innerHTML = "";

            let currentNode = myQueue.head;

            while (currentNode !== null) {
                let box = document.createElement("div");
                box.className = "item";
                box.innerHTML = currentNode.data;
                displayArea.appendChild(box);

                currentNode = currentNode.next;
            }
        }

        checkInputType();

    </script>
</body>

</html>
