<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LinkedList</title>

    <style>
        body {
            font-family: sans-serif;
            background-color: #f4f4f9;
        }

        .container {
            max-width: 800px;
            margin: 0 auto;
            padding: 20px;
        }

        .controls {
            margin-bottom: 20px;
            display: flex;
            gap: 10px;
        }


        .controlsRow {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
            margin-top: 10px;
            align-items: center;
        }

        .list {
            display: flex;
            align-items: center;
            gap: 10px;
            flex-wrap: wrap;
            margin-top: 15px;
            min-height: 40px;
        }

        .node {
            border: 1px solid black;
            padding: 8px 16px;
        }

        .arrow {
            font-size: 20px;
            color: black;
        }
    </style>
</head>

<body>

    <div class="container">

        <h2>Linked List</h2>

        <div class="controls">
            <select id="listName">
                <option value="USER">USER</option>
                <option value="ANIMAL">ANIMAL</option>
                <option value="CARS">CARS</option>
            </select>
            <button onclick="createList()">Create List</button>
        </div>

        <div id="listsArea"></div>

    </div>

    <script>

        class Node {
            constructor(data) {
                this.data = data;
                this.next = null;
            }
        }

        class LinkedList {
            constructor() {
                this.head = null;
            }

            prepend(value) {
                let newNode = new Node(value);
                newNode.next = this.head;
                this.head = newNode;
            }

            append(value) {
                let newNode = new Node(value);

                if (this.head === null) {
                    this.head = newNode;
                    return;
                }

                let currentNode = this.head;
                while (currentNode.next !== null) {
                    currentNode = currentNode.next;
                }
                currentNode.next = newNode;
            }

            insertAt(index, value) {
                if (index === 0) {
                    this.prepend(value);
                    return;
                }

                let newNode = new Node(value);
                let currentNode = this.head;
                let currentIndex = 0;

                while (currentNode !== null && currentIndex < index - 1) {
                    currentNode = currentNode.next;
                    currentIndex++;
                }

                if (currentNode === null) {
                    return;
                }

                newNode.next = currentNode.next;
                currentNode.next = newNode;
            }

            shift() {
                if (this.head === null) {
                    return;
                }
                this.head = this.head.next;
            }

            pop() {
                if (this.head === null) {
                    return;
                }

                if (this.head.next === null) {
                    this.head = null;
                    return;
                }

                let currentNode = this.head;
                while (currentNode.next.next !== null) {
                    currentNode = currentNode.next;
                }
                currentNode.next = null;
            }

            removeAt(index) {
                if (this.head === null) {
                    return;
                }

                if (index === 0) {
                    this.head = this.head.next;
                    return;
                }

                let currentNode = this.head;
                let currentIndex = 0;

                while (currentNode.next !== null && currentIndex < index - 1) {
                    currentNode = currentNode.next;
                    currentIndex++;
                }

                if (currentNode.next === null) {
                    return;
                }

                currentNode.next = currentNode.next.next;
            }

            reverse() {
                let previousNode = null;
                let currentNode = this.head;
                let nextNode = null;

                while (currentNode !== null) {
                    nextNode = currentNode.next;
                    currentNode.next = previousNode;
                    previousNode = currentNode;
                    currentNode = nextNode;
                }
                this.head = previousNode;
            }

            clear() {
                this.head = null;
            }
        }

        const lists = {};

        function createList() {
            let name = document.getElementById("listName").value;

            if (lists[name] !== undefined) {
                alert("List นี้ถูกสร้างไว้แล้ว!");
                return;
            }

            lists[name] = new LinkedList();
            drawListUI(name);
        }

        function drawListUI(name) {
            let box = document.createElement("div");
            box.className = "listBox";
            box.id = "box-" + name;

            box.innerHTML = `
                <h3>${name}</h3>
                <div class="controlsRow">
                    <select class="methodSelect" onchange="updateInputVisibility(this)">
                        <option value="append">Append</option>
                        <option value="prepend">Prepend</option>
                        <option value="insertAt">InsertAt</option>
                        <option value="shift">Shift</option>
                        <option value="pop">Pop</option>
                        <option value="removeAt">RemoveAt</option>
                        <option value="reverse">Reverse</option>
                        <option value="clear">Clear</option>
                    </select>
                    
                    <input type="text" class="valueInput">
                    <input type="number" class="indexInput" style="display:none; width: 140px;">
                    
                    <button onclick="runMethod('${name}')">Run</button>
                </div>
                <div class="list" id="view-${name}"></div>
            `;

            document.getElementById("listsArea").appendChild(box);
            updateListDisplay(name);
        }

        function updateInputVisibility(selectElement) {
            let box = selectElement.closest(".listBox");
            let valueInput = box.querySelector(".valueInput");
            let indexInput = box.querySelector(".indexInput");
            let method = selectElement.value;

            valueInput.style.display = "none";
            indexInput.style.display = "none";

            if (method === "append" || method === "prepend") {
                valueInput.style.display = "inline-block";
            }
            else if (method === "removeAt") {
                indexInput.style.display = "inline-block";
            }
            else if (method === "insertAt") {
                valueInput.style.display = "inline-block";
                indexInput.style.display = "inline-block";
            }
        }

        function runMethod(name) {
            let box = document.getElementById("box-" + name);
            let method = box.querySelector(".methodSelect").value;
            let value = box.querySelector(".valueInput").value;
            let index = parseInt(box.querySelector(".indexInput").value);

            let myList = lists[name];

            if (method === "append") {
                if (value !== "") myList.append(value);
            }
            if (method === "prepend") {
                if (value !== "") myList.prepend(value);
            }
            if (method === "insertAt") {
                if (value !== "" && !isNaN(index)) myList.insertAt(index, value);
            }
            if (method === "shift") {
                myList.shift();
            }
            if (method === "pop") {
                myList.pop();
            }
            if (method === "removeAt") {
                if (!isNaN(index)) myList.removeAt(index);
            }
            if (method === "reverse") {
                myList.reverse();
            }
            if (method === "clear") {
                myList.clear();
            }

            box.querySelector(".valueInput").value = "";
            box.querySelector(".indexInput").value = "";

            updateListDisplay(name);
        }

        function updateListDisplay(name) {
            let displayArea = document.getElementById("view-" + name);
            displayArea.innerHTML = "";

            let currentNode = lists[name].head;

            while (currentNode !== null) {
                let nodeElement = document.createElement("div");
                nodeElement.className = "node";
                nodeElement.innerHTML = currentNode.data;
                displayArea.appendChild(nodeElement);

                if (currentNode.next !== null) {
                    let arrowElement = document.createElement("div");
                    arrowElement.className = "arrow";
                    arrowElement.innerHTML = "→";
                    displayArea.appendChild(arrowElement);
                }

                currentNode = currentNode.next;
            }
        }
    </script>
</body>

</html>
